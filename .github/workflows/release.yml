name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build app
        run: ./build_app.sh

      - name: Package app
        run: |
          cd .build
          ditto -c -k --keepParent Remlink.app Remlink-macOS.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Remlink-macOS
          path: .build/Remlink-macOS.zip

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: .build/Remlink-macOS.zip
